{% macro severity_badge(sev) %}
{% set classes = {
    "critical": "sev-badge--critical",
    "high": "sev-badge--high",
    "medium": "sev-badge--medium",
    "low": "sev-badge--low",
    "info": "sev-badge--info",
} %}
<span class="sev-badge {{ classes.get(sev, 'sev-badge--info') }}">
    <span class="sev-dot"></span>
    {{ sev }}
</span>
{% endmacro %}
